<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peter &amp; Parent: Star Team</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at 50% 0%, #263b83, #10142f 62%, #080a19); color: #f8f7ff; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    main { width: min(100%, 1010px); padding: 20px; text-align: center; }
    h1 { margin: 0 0 4px; font-size: clamp(1.55rem, 4vw, 2.35rem); }
    p { margin: 0 0 14px; color: #d8ddff; }
    canvas { display: block; width: 100%; height: auto; border: 4px solid #91d8ff; border-radius: 18px; background: #18275e; box-shadow: 0 12px 35px #0009; touch-action: none; }
    .bar { margin-top: 12px; display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
    button { padding: 9px 15px; cursor: pointer; border: 0; border-radius: 999px; background: #ffd34e; color: #242141; font-weight: 800; font-size: 1rem; }
    kbd { padding: 2px 6px; border: 1px solid #8ea0d9; border-radius: 4px; background: #20285a; }
    .online { margin: 0 auto 12px; max-width: 760px; padding: 10px; border: 1px solid #7289d4; border-radius: 10px; background: #141938bb; display: grid; gap: 8px; }
    .online-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    #share-link { min-width: min(100%, 490px); padding: 8px; border: 1px solid #8ea0d9; border-radius: 6px; background: #0b1030; color: #f8f7ff; }
  </style>
</head>
<body>
  <main>
    <h1>Peter &amp; Parent: Star Team</h1>
    <p>Work together: collect every star, avoid the chasers, and both reach the flag.</p>
    <section class="online" aria-label="Online room controls">
      <strong id="online-status">Preparing an online room…</strong>
      <div class="online-row"><input id="share-link" aria-label="Share this room link" readonly><button id="copy-link">Copy room link</button></div>
    </section>
    <canvas id="game" width="960" height="540" aria-label="Two player platform game"></canvas>
    <div class="bar">
      <span><b style="color:#65d9ff">P1 Blue:</b> <kbd>A</kbd><kbd>D</kbd> move, <kbd>W</kbd> jump &nbsp; <b style="color:#ff91d7">P2 Pink:</b> <kbd>←</kbd><kbd>→</kbd> move, <kbd>↑</kbd> jump</span>
      <button id="restart">Restart level</button>
    </div>
  </main>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script>
    const canvas = document.querySelector('#game');
    const ctx = canvas.getContext('2d');
    const restart = document.querySelector('#restart');
    const statusLabel = document.querySelector('#online-status');
    const shareLink = document.querySelector('#share-link');
    const copyLink = document.querySelector('#copy-link');
    const keys = new Set();
    const W = canvas.width, H = canvas.height;
    const ground = { x: 0, y: 490, w: 960, h: 50 };

    // Add a sixth level later by copying one of these objects.
    const levels = [
      {
        name: 'Warm-up Woods',
        platforms: [ground, { x: 115, y: 395, w: 165, h: 20 }, { x: 385, y: 325, w: 160, h: 20 }, { x: 650, y: 245, w: 150, h: 20 }, { x: 745, y: 405, w: 130, h: 20 }],
        stars: [[190, 350], [460, 280], [725, 200], [808, 360]],
        hazards: [[290, 463, 76, 27], [558, 463, 80, 27]],
        enemies: [[485, 448, 1.45]], flag: [892, 418]
      },
      {
        name: 'Stepping Stones',
        platforms: [ground, { x: 92, y: 410, w: 130, h: 20 }, { x: 300, y: 350, w: 125, h: 20 }, { x: 500, y: 290, w: 145, h: 20 }, { x: 720, y: 385, w: 135, h: 20 }],
        stars: [[155, 365], [360, 305], [570, 245], [785, 340], [905, 445]],
        hazards: [[224, 463, 68, 27], [427, 463, 68, 27], [648, 463, 64, 27]],
        enemies: [[450, 448, 1.55], [685, 448, 1.35]], flag: [900, 418]
      },
      {
        name: 'Moonlit Climb',
        platforms: [ground, { x: 85, y: 405, w: 110, h: 20 }, { x: 250, y: 335, w: 120, h: 20 }, { x: 430, y: 265, w: 125, h: 20 }, { x: 620, y: 335, w: 120, h: 20 }, { x: 790, y: 255, w: 105, h: 20 }],
        stars: [[140, 360], [310, 290], [490, 220], [680, 290], [842, 210]],
        hazards: [[198, 463, 45, 27], [373, 463, 50, 27], [560, 463, 54, 27], [745, 463, 42, 27]],
        enemies: [[390, 448, 1.65], [710, 448, 1.55]], flag: [905, 418]
      },
      {
        name: 'Chaser Canyon',
        platforms: [ground, { x: 70, y: 360, w: 145, h: 20 }, { x: 295, y: 410, w: 110, h: 20 }, { x: 475, y: 320, w: 145, h: 20 }, { x: 710, y: 385, w: 145, h: 20 }],
        stars: [[130, 315], [350, 365], [545, 275], [775, 340], [910, 445]],
        hazards: [[220, 463, 70, 27], [408, 463, 64, 27], [625, 463, 78, 27]],
        enemies: [[255, 448, 1.7], [440, 448, 1.8], [665, 448, 1.6]], flag: [900, 418]
      },
      {
        name: 'The Star Fortress',
        platforms: [ground, { x: 85, y: 405, w: 115, h: 20 }, { x: 255, y: 325, w: 115, h: 20 }, { x: 420, y: 405, w: 100, h: 20 }, { x: 575, y: 300, w: 125, h: 20 }, { x: 760, y: 220, w: 130, h: 20 }],
        stars: [[140, 360], [315, 280], [470, 360], [635, 255], [825, 175], [915, 445]],
        hazards: [[203, 463, 48, 27], [372, 463, 45, 27], [522, 463, 48, 27], [703, 463, 52, 27]],
        enemies: [[225, 448, 1.85], [540, 448, 1.75], [705, 448, 1.9]], flag: [900, 418]
      }
    ];

    let levelIndex, players, stars, enemies, message, levelDone, transitionFrames;
    let peer, connection, isHost, guestConnected = false, stateFrame = 0;
    const roomParam = new URLSearchParams(location.search).get('room');
    const hasValidRoom = /^[a-z0-9-]{4,32}$/i.test(roomParam || '');
    const room = hasValidRoom ? roomParam : Math.random().toString(36).slice(2, 9);

    function overlaps(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
    function current() { return levels[levelIndex]; }
    function makePlayer(id, x, color, controls) {
      return { id, x, y: 420, spawnX: x, w: 30, h: 42, vx: 0, vy: 0, onGround: false, facing: 1, color, controls, invincible: 60, atGoal: false };
    }
    function startLevel(index = levelIndex, note) {
      levelIndex = index;
      players = [
        makePlayer('P1', 35, '#54caff', { left: 'KeyA', right: 'KeyD', jump: 'KeyW' }),
        makePlayer('P2', 76, '#ff83d1', { left: 'ArrowLeft', right: 'ArrowRight', jump: 'ArrowUp' })
      ];
      stars = current().stars.map(([x, y]) => ({ x, y, found: false }));
      enemies = current().enemies.map(([x, y, speed]) => ({ x, y, w: 32, h: 30, vx: 0, vy: 0, speed, onGround: false, hop: 35 }));
      levelDone = false;
      transitionFrames = 0;
      message = note || `Level ${levelIndex + 1}: ${current().name}`;
    }
    function setOnlineStatus(text) { statusLabel.textContent = text; }
    function broadcastState(force = false) {
      if (!isHost || !connection?.open || (!force && ++stateFrame % 2)) return;
      connection.send({ type: 'state', state: { levelIndex, players, stars, enemies, message, levelDone, transitionFrames } });
    }
    function applyRemoteState(state) {
      if (!state || !Number.isInteger(state.levelIndex) || !levels[state.levelIndex] || !Array.isArray(state.players)) return;
      levelIndex = state.levelIndex; players = state.players; stars = state.stars; enemies = state.enemies;
      message = state.message; levelDone = state.levelDone; transitionFrames = state.transitionFrames;
    }
    function attachConnection(conn) {
      connection = conn;
      conn.on('open', () => {
        guestConnected = true;
        if (isHost) ['ArrowLeft', 'ArrowRight', 'ArrowUp'].forEach(code => keys.delete(code));
        setOnlineStatus(isHost ? 'Player 2 joined — play together!' : 'Connected as Player 2 — use the arrow keys.');
        if (isHost) broadcastState(true);
      });
      conn.on('data', data => {
        if (isHost && data?.type === 'key' && ['ArrowLeft', 'ArrowRight', 'ArrowUp'].includes(data.code)) {
          if (data.down) keys.add(data.code); else keys.delete(data.code);
          if (data.down && !data.repeat && data.code === 'ArrowUp') jump(players[1]);
        } else if (!isHost && data?.type === 'state') applyRemoteState(data.state);
      });
      conn.on('close', () => {
        guestConnected = false; connection = null; ['ArrowLeft', 'ArrowRight', 'ArrowUp'].forEach(code => keys.delete(code));
        setOnlineStatus(isHost ? 'Player 2 left. Share the room link to invite someone.' : 'Connection closed. Ask Player 1 to open the room again.');
      });
    }
    function setupOnline() {
      isHost = !hasValidRoom;
      const roomURL = new URL(location.href);
      roomURL.searchParams.set('room', room);
      if (isHost) history.replaceState({}, '', roomURL);
      shareLink.value = roomURL.toString();
      copyLink.addEventListener('click', async () => {
        try { await navigator.clipboard.writeText(shareLink.value); copyLink.textContent = 'Copied!'; }
        catch { shareLink.select(); copyLink.textContent = 'Link selected'; }
        setTimeout(() => { copyLink.textContent = 'Copy room link'; }, 1500);
      });
      if (!window.Peer) { setOnlineStatus('Online connection service did not load. Check your internet connection.'); return; }
      if (isHost) {
        setOnlineStatus('Creating your room…');
        peer = new Peer(`peter-platform-online-${room}`);
        peer.on('open', () => setOnlineStatus('You are Player 1. Copy the room link and send it to Player 2.'));
        peer.on('connection', incoming => {
          if (connection?.open) { incoming.close(); return; }
          attachConnection(incoming);
        });
      } else {
        setOnlineStatus('Joining Player 1…');
        peer = new Peer();
        peer.on('open', () => attachConnection(peer.connect(`peter-platform-online-${room}`, { reliable: true })));
      }
      peer.on('error', error => setOnlineStatus(`Online connection problem: ${error.type}. Player 1 must open the room link first.`));
    }
    function respawn(player, reason) {
      player.x = player.spawnX; player.y = 420; player.vx = 0; player.vy = 0; player.invincible = 90; player.atGoal = false;
      message = `${player.id} ${reason}! Back to the start.`;
    }
    function landOnPlatforms(entity) {
      const oldBottom = entity.y + entity.h;
      entity.y += entity.vy;
      entity.onGround = false;
      for (const p of current().platforms) {
        if (entity.vy >= 0 && entity.x + entity.w > p.x && entity.x < p.x + p.w && oldBottom <= p.y + 3 && entity.y + entity.h >= p.y) {
          entity.y = p.y - entity.h; entity.vy = 0; entity.onGround = true;
        }
      }
    }
    function updatePlayer(player) {
      const move = (keys.has(player.controls.right) ? 1 : 0) - (keys.has(player.controls.left) ? 1 : 0);
      player.vx = move * 5.25;
      if (move) player.facing = move;
      player.x = Math.max(0, Math.min(W - player.w, player.x + player.vx));
      player.vy += 0.62;
      landOnPlatforms(player);
      if (player.invincible > 0) player.invincible--;
      if (player.y > H + 80) respawn(player, 'fell');
      for (const [x, y, w, h] of current().hazards) if (overlaps(player, { x, y, w, h })) respawn(player, 'touched lava');
    }
    function updateEnemy(enemy) {
      const target = players.reduce((closest, player) => Math.abs(player.x - enemy.x) < Math.abs(closest.x - enemy.x) ? player : closest);
      enemy.vx = Math.sign(target.x - enemy.x) * enemy.speed;
      enemy.x = Math.max(0, Math.min(W - enemy.w, enemy.x + enemy.vx));
      enemy.vy += 0.54;
      landOnPlatforms(enemy);
      // A slime hops more eagerly when its target is above it.
      if (enemy.onGround) {
        enemy.hop--;
        if (enemy.hop <= 0 && (target.y < enemy.y - 18 || Math.abs(target.x - enemy.x) > 65)) { enemy.vy = -9.4; enemy.onGround = false; enemy.hop = 32 + Math.floor(Math.random() * 28); }
      }
      if (enemy.y > H + 80) { enemy.x = W - 120; enemy.y = 420; enemy.vy = 0; }
    }
    function update() {
      if (levelDone) {
        if (++transitionFrames > 120) {
          if (levelIndex === levels.length - 1) startLevel(0, 'Five levels cleared! Start a new team adventure.');
          else startLevel(levelIndex + 1, `Level ${levelIndex + 2}: ${levels[levelIndex + 1].name}`);
        }
        return;
      }
      players.forEach(updatePlayer);
      enemies.forEach(updateEnemy);
      for (const player of players) {
        if (!player.invincible && enemies.some(enemy => overlaps(player, enemy))) respawn(player, 'was caught');
      }
      for (const star of stars) {
        if (!star.found && players.some(player => overlaps(player, { x: star.x - 14, y: star.y - 14, w: 28, h: 28 }))) {
          star.found = true;
          message = `Team stars: ${stars.filter(star => star.found).length}/${stars.length}`;
        }
      }
      const allStars = stars.every(star => star.found);
      const flag = { x: current().flag[0], y: current().flag[1], w: 25, h: 72 };
      for (const player of players) {
        if (allStars && !player.atGoal && overlaps(player, flag)) { player.atGoal = true; message = `${player.id} is waiting at the flag!`; }
      }
      if (allStars && players.every(player => player.atGoal)) { levelDone = true; transitionFrames = 0; message = levelIndex === levels.length - 1 ? 'YOU CLEARED ALL FIVE LEVELS!' : 'TEAM LEVEL COMPLETE!'; }
      if (!allStars && players.some(player => overlaps(player, flag))) message = `The flag opens after ${stars.filter(star => star.found).length}/${stars.length} stars.`;
    }

    function starPath(x, y, outer, inner) {
      ctx.beginPath();
      for (let i = 0; i < 10; i++) { const r = i % 2 ? inner : outer, a = -Math.PI / 2 + i * Math.PI / 5, px = x + Math.cos(a) * r, py = y + Math.sin(a) * r; i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }
      ctx.closePath();
    }
    function drawPlayer(player) {
      ctx.save(); ctx.globalAlpha = player.invincible && Math.floor(player.invincible / 6) % 2 ? 0.42 : 1;
      ctx.translate(player.x + player.w / 2, player.y); ctx.scale(player.facing, 1); ctx.translate(-player.w / 2, 0);
      ctx.fillStyle = player.color; ctx.fillRect(5, 18, 21, 22);
      ctx.fillStyle = '#31446d'; ctx.fillRect(6, 38, 8, 5); ctx.fillRect(18, 38, 8, 5);
      ctx.fillStyle = '#ffd0a5'; ctx.fillRect(7, 5, 18, 16);
      ctx.fillStyle = player.id === 'P1' ? '#6c4938' : '#553555'; ctx.fillRect(5, 1, 22, 8);
      ctx.fillStyle = '#182141'; ctx.fillRect(20, 11, 3, 3); ctx.restore();
    }
    function draw() {
      const sky = ctx.createLinearGradient(0, 0, 0, H); sky.addColorStop(0, '#1d2e75'); sky.addColorStop(.65, '#7953ad'); sky.addColorStop(1, '#f29a76'); ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#fff8c6'; ctx.beginPath(); ctx.arc(105, 82, 38, 0, Math.PI * 2); ctx.fill();
      for (let i = 0; i < 38; i++) { const x = (i * 89) % W, y = 25 + (i * 47) % 250; ctx.fillStyle = '#fff'; ctx.globalAlpha = .35 + (i % 3) * .2; ctx.fillRect(x, y, 3, 3); }
      ctx.globalAlpha = 1; ctx.fillStyle = '#273e72'; ctx.beginPath(); ctx.moveTo(0, 380); ctx.lineTo(130, 250); ctx.lineTo(270, 380); ctx.lineTo(420, 230); ctx.lineTo(600, 380); ctx.lineTo(780, 255); ctx.lineTo(960, 380); ctx.closePath(); ctx.fill();
      for (const p of current().platforms) { ctx.fillStyle = '#553e2f'; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.fillStyle = '#6fcd61'; ctx.fillRect(p.x, p.y, p.w, 8); ctx.fillStyle = '#96ec76'; ctx.fillRect(p.x, p.y, p.w, 3); }
      for (const [x, y, w, h] of current().hazards) { ctx.fillStyle = '#711c24'; ctx.fillRect(x, y, w, h); ctx.fillStyle = '#ff4a32'; ctx.beginPath(); for (let px = x; px < x + w; px += 18) { ctx.moveTo(px, y + h); ctx.lineTo(px + 9, y); ctx.lineTo(px + 18, y + h); } ctx.fill(); ctx.fillStyle = '#ffbd3f'; ctx.fillRect(x, y + h - 5, w, 5); }
      for (const star of stars) if (!star.found) { ctx.save(); ctx.shadowColor = '#fff8a4'; ctx.shadowBlur = 15; ctx.fillStyle = '#ffdf44'; starPath(star.x, star.y, 15, 7); ctx.fill(); ctx.restore(); }
      const [flagX, flagY] = current().flag, unlocked = stars.every(star => star.found); ctx.strokeStyle = '#e7efff'; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(flagX + 7, flagY); ctx.lineTo(flagX + 7, flagY + 72); ctx.stroke(); ctx.fillStyle = unlocked ? '#64ef8d' : '#a8aac1'; ctx.beginPath(); ctx.moveTo(flagX + 9, flagY + 5); ctx.lineTo(flagX + 55, flagY + 19); ctx.lineTo(flagX + 9, flagY + 35); ctx.closePath(); ctx.fill();
      for (const enemy of enemies) { ctx.save(); ctx.translate(enemy.x, enemy.y); ctx.fillStyle = '#ec4054'; ctx.beginPath(); ctx.arc(16, 15, 16, Math.PI, 0); ctx.lineTo(32, 30); ctx.lineTo(0, 30); ctx.closePath(); ctx.fill(); ctx.fillStyle = '#fff'; ctx.fillRect(8, 12, 6, 6); ctx.fillRect(19, 12, 6, 6); ctx.fillStyle = '#25213d'; ctx.fillRect(11, 14, 2, 3); ctx.fillRect(22, 14, 2, 3); ctx.restore(); }
      players.forEach(drawPlayer);
      ctx.fillStyle = '#141938cc'; ctx.fillRect(18, 16, 405, 48); ctx.fillStyle = '#fff'; ctx.font = 'bold 20px system-ui'; ctx.fillText(`Level ${levelIndex + 1}/5 · ${current().name}`, 31, 38); ctx.font = '16px system-ui'; ctx.fillText(message, 31, 58);
      ctx.fillStyle = '#141938cc'; ctx.fillRect(790, 16, 152, 42); ctx.fillStyle = '#ffdf44'; ctx.font = 'bold 18px system-ui'; ctx.fillText(`★ ${stars.filter(s => s.found).length}/${stars.length}`, 810, 43);
      if (levelDone) { ctx.fillStyle = '#111a'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#fff'; ctx.font = 'bold 44px system-ui'; ctx.textAlign = 'center'; ctx.fillText(message, W / 2, 245); ctx.font = '22px system-ui'; ctx.fillText(levelIndex === levels.length - 1 ? 'Restarting at Level 1 shortly…' : 'Next level shortly…', W / 2, 285); ctx.textAlign = 'start'; }
    }
    function jump(player) { if (player.onGround && !levelDone) { player.vy = -12.8; player.onGround = false; } }
    function isPlayerOneKey(code) { return ['KeyA', 'KeyD', 'KeyW'].includes(code); }
    function isPlayerTwoKey(code) { return ['ArrowLeft', 'ArrowRight', 'ArrowUp'].includes(code); }
    window.addEventListener('keydown', event => {
      if (!isPlayerOneKey(event.code) && !isPlayerTwoKey(event.code)) return;
      event.preventDefault();
      if (isHost && (isPlayerOneKey(event.code) || !guestConnected)) {
        keys.add(event.code);
        if (!event.repeat) players.forEach(player => { if (event.code === player.controls.jump) jump(player); });
      } else if (!isHost && isPlayerTwoKey(event.code)) {
        connection?.open && connection.send({ type: 'key', code: event.code, down: true, repeat: event.repeat });
      }
    });
    window.addEventListener('keyup', event => {
      if (!isPlayerOneKey(event.code) && !isPlayerTwoKey(event.code)) return;
      if (isHost && (isPlayerOneKey(event.code) || !guestConnected)) keys.delete(event.code);
      else if (!isHost && isPlayerTwoKey(event.code)) connection?.open && connection.send({ type: 'key', code: event.code, down: false });
    });
    restart.addEventListener('click', () => {
      if (isHost) startLevel(levelIndex, `Level ${levelIndex + 1}: ${current().name}`);
      else setOnlineStatus('Only Player 1 can restart the shared level.');
    });
    startLevel(0); setupOnline(); (function loop() { if (isHost) { update(); broadcastState(); } draw(); requestAnimationFrame(loop); })();
  </script>
</body>
</html>
